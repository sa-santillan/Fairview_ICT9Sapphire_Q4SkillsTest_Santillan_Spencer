<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT 9 Skills Test - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #ffffff;
            color: #000000; 
            font-family: sans-serif; 
        }

        .login-container {
            max-width: 400px; 
            margin: 100px auto; 
            border: 1px solid #000; 
            padding: 50px; 
            border-radius: 15px
        }

        .btn-dark { 
            border-radius: 0; 
            background-color: #000; 
            border: 1px solid #000; 
        }

        .form-control { 
        border-radius: 10px; 
        border: 1px solid #000; 
        }

    </style>
</head>
<body>
    <div class="login-container">
        <h2 class="text-center mb-4">Log In</h2>
        
        <p class="small text-center mb-4">Please enter your username and password to view your virtual notebook.</p>

        <form>  
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" id="user" class="form-control" placeholder="renn santos">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" class="form-control" placeholder="iloveict6767">
            </div>
            <div class="d-grid gap-2">
                <button type="button" onclick="handleLogin()" class="btn btn-dark rounded-3">Log In</button>
                <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-dark rounded-3" >
            </div>

            </div>
        </form>
    </div>

    <script>
    let AttemptCounter = 0;
    const MAXAttempts = 3;

    function handleLogin() {
        let username = document.getElementById("user").value;
        let password = document.querySelector('input[type="password"]').value;
        let button = document.querySelector("button");

        let correctUser = "renn santos";
        let correctPass = "iloveict6767";

        if (button.disabled) return;
        if (username === correctUser && password === correctPass) {
            alert("Login successful!");
            AttemptCounter = 0;
            window.location.href = "notebooks.html";
        } 
        
        else {
            AttemptCounter++;

            if (AttemptCounter >= MAXAttempts) {
                alert("Access denied. You are now locked out.");
                button.disabled = true;

            } else {
                alert("Incorrect username or password. Attempt " + AttemptCounter + " of 3");
            }
        }
    }

</script>
</body>
</html>
