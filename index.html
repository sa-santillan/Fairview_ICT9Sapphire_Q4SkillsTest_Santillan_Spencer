<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT 9 Skills Test - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #ffffff;
            color: #000000; 
            font-family: sans-serif; 
        }

        .login-container {
            max-width: 350px; 
            margin: 100px auto; 
            border: 1px solid #000; 
            padding: 20px; 
            border-radius: 20px
        }

        .btn-dark { 
            border-radius: 0; 
            background-color: #000; 
            border: 1px solid #000; 
        }

        .form-control { 
            border-radius: 0; 
            border: 1px solid #000; 
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 class="text-center mb-4">Log In</h2>
        
        <p class="small text-center mb-4">Please enter your username and password</p>

        <form>
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" id="user" class="form-control" placeholder="username">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" class="form-control" placeholder="password">
            </div>
            <div class="d-grid gap-2">
                <button type="button" onclick="handleLogin()" class="btn btn-dark">Log In</button>
            </div>
        </form>
    </div>

    <script>
        // JavaScript Variables and Operators
        // JavaScript Comments
        function handleLogin() {
            let username = document.getElementById('user').value;
            let minLength = 1;

            // JavaScript Conditional Statement
            if (username.length >= minLength) {
                // JavaScript Output
                window.alert("Login Successful");
                window.location.href = "notebooks.html";
            } else {
                window.alert("Please enter a username.");
            }
        }
    </script>
</body>
</html>
