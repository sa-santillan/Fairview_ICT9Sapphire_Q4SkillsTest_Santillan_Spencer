<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Notebooks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        font-family: sans-serif;
        background-color: #f5f5f5;
        display: flex;
        flex-direction: column;
    }

    header {
        background-color: #000000;
        color: #fff;
        padding: 15px;
    }

    .nav-links a {
        color: #fff;
        text-decoration: none;
        margin-left: 15px;
        font-size: 14px;
    }

    .content {
        flex: 1;
        padding: 30px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .subjects {
        background: #fff;
        border: 1px solid #000;
        border-radius: 15px;
        padding: 20px;
    }
</style>
</head>

<body>

<header>
    <h5 class="m-0">Virtual Notebooks</h5>
    <div class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#">Tasks</a>
        <a href="#">Profile</a>
        <a href="#">Logout</a>
    </div>
</header>

<br>

<div class="grid">
    <div class="subjects">
        <h6>Filipino</h6>
        <small>9-Sapphire 2025-2026</small>
    </div>

    <div class="subjects">
        <h6>English</h6>
        <small>9-Sapphire 2025-2026</small>
    </div>

    <div class="subjects">
        <h6>Math</h6>
        <small>9-Sapphire 2025-2026</small>
    </div>

    <div class="subjects">
        <h6>Science</h6>
        <small>9-Sapphire 2025-2026</small>
    </div>

    <div class="subjects">
        <h6>Social Studies</h6>
        <small>9-Sapphire 2025-2026</small>
    </div>

    <div class="subjects">
        <h6>Values Education</h6>
        <small>9-Sapphire 2025-2026</small>
    </div>
</div>

</body>
</html>
